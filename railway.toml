# Railway 配置文件
# 文档: https://railway.app/docs/config-as-code

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "node relay.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# 环境变量（在 Railway Dashboard 中设置，或在此声明默认值）
# Railway 会自动注入 PORT 环境变量

# 可选：设置认证 Token（防止未授权访问）
# [env]
# DOZE_RELAY_TOKEN = "your-secret-token"

# Railway 配置文件
# 文档: https://railway.app/docs/config-as-code

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "node relay.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# 环境变量（在 Railway Dashboard → Variables 中设置）
# Railway 会自动注入 PORT 环境变量，无需手动设置
#
# 必须设置的环境变量:
#   DOZE_ACCESS_KEY — 访问密钥，保护 Web UI 和所有 API 端点
#     示例: DOZE_ACCESS_KEY=your-access-key-123

# Railway 配置文件
# 文档: https://railway.app/docs/config-as-code

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "node relay.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# 环境变量（在 Railway Dashboard → Variables 中设置）
# Railway 会自动注入 PORT 环境变量，无需手动设置
#
# 可选环境变量:
#   DOZE_RELAY_TOKEN — 认证 Token，防止未授权访问 /api/pair/init
#     示例: DOZE_RELAY_TOKEN=your-secret-token
